[package]
name = "agent-workflow"
version = "1.0.0"
edition = "2021"
authors = ["kuyavinny"]
description = "Workflow & Harness Controller for agent-system-os"

[dependencies]
# Core serialization for workflow definitions (YAML/JSON) and run state (JSON)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
# CLI parsing — all commands derive from this
clap = { version = "4.5", features = ["derive"] }
# Timestamps for run state, phase history, and logs
chrono = { version = "0.4", features = ["serde"] }
# UUID v4 for unique identifiers; used in PR 3 (init-run) for run_id generation
uuid = { version = "1.8", features = ["v4", "serde"] }

[dev-dependencies]
tempfile = "3.10"
